# Site-specific values — get from pi/config.yaml:
#   entity_id  → homeassistant.fan_speed_entity
#   topic      → topics.speed
alias: Rack Fan PID to MQTT
trigger:
  - platform: state
    entity_id: input_number.rack_fan_speed
condition: []
action:
  - service: mqtt.publish
    data:
      topic: rack/fan/speed
      retain: true
      payload: "{{ states('input_number.rack_fan_speed') | int }}"
mode: single
