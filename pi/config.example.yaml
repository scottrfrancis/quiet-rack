# Copy to config.yaml and fill in your values.
# config.yaml is gitignored — credentials stay local.

mqtt:
  host: 192.168.1.100
  port: 1883
  # user: mqtt_user        # omit user/password for anonymous brokers
  # password: mqtt_password

topics:
  speed: rack/fan/speed    # HA publishes target speed here
  rpm: rack/fan/rpm        # Pi publishes measured RPM here
  status: rack/fan/status  # LWT / birth messages (online/offline)

homeassistant:
  host: homeassistant.local         # HA instance hostname
  ssh_user: hassio                  # SSH user for HA (key-based, no password)
  # token: YOUR_LONG_LIVED_ACCESS_TOKEN  # for REST API / ha CLI
  temperature_entity: sensor.vault_temperature  # PID input sensor
  fan_speed_entity: input_number.rack_fan_speed  # PID output helper

pi:
  host: cooler.local              # Pi hostname (.local mDNS)
  ssh_user: scott                 # SSH user (key-based, no password)

gpio:
  pwm: 18                  # hardware PWM pin (GPIO18)
  tach: 24                 # tach input pin (GPIO24), set null to disable

pwm:
  frequency: 25000         # 25kHz per 4-pin fan spec

tach:
  interval: 10             # seconds between RPM reports

influxdb:
  host: 192.168.4.6              # InfluxDB v2 host
  port: 8086
  org: myorg
  bucket: homeassistant
  # token: YOUR_INFLUXDB_TOKEN   # gitignored in config.yaml

# PID tuning — see docs/pid_tuning.md for methodology.
# Thresholds derived from vault temp history and bang-bang setpoints.
#
# Zone map:  <LoLo=OFF | LoLo–LO=idle | LO–HI=ramp | HI+=full | HiHi+=backup fan
pid:
  setpoint: 122.0          # °F — PID target; vault idle cluster median
  hi: 130.0                # °F — new fan at 100%
  lo: 122.0                # °F — new fan at idle
  lolo: 110.0              # °F — fan OFF below this
  hihi: 135.0              # °F — old bang-bang AC fan backup threshold
  # NEGATIVE gains for cooling. simple-pid: error = setpoint - measured.
  # Negative gains invert: temp above setpoint → positive fan output.
  kp: -12.5                # proportional: -100/(HI-LO) = -100/8
  ki: 0                    # integral: disabled — see docs/pid_tuning.md
  kd: -0.3                 # derivative: light damping
  output_min: 0            # PID can output 0; lolo cutoff handles off
  output_max: 100          # full speed ceiling
  sample_time: 30          # seconds between PID updates
