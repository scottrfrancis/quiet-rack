# Test configuration — uses test topic namespace to avoid affecting the live fan.
# Broker host/credentials come from environment variables with these defaults.
# No real secrets here — this file is checked in.

mqtt:
  host: localhost       # override with MQTT_TEST_HOST env var
  port: 1883            # override with MQTT_TEST_PORT env var
  user: test            # override with MQTT_TEST_USER env var
  password: test        # override with MQTT_TEST_PASS env var

topics:
  speed: rack/fan/test/speed
  rpm: rack/fan/test/rpm

gpio:
  pwm: 18
  tach: 24

pwm:
  frequency: 25000

tach:
  interval: 1           # short interval for faster test cycles
